<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to Table Filler</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>CSV to Table Filler</h1>
        
        <div class="section">
            <label for="csv-file">Select CSV File:</label>
            <input type="file" id="csv-file" accept=".csv" />
        </div>

        <div class="section">
            <h2>Column Mapping</h2>
            <div id="mapping-container">
                <p class="placeholder">Load a CSV file to configure mapping</p>
            </div>
        </div>

        <div class="section">
            <h2>Available Tables</h2>
            <select id="table-select">
                <option value="">Select a table...</option>
            </select>
        </div>

        <div class="section buttons">
            <button id="save-mapping" class="btn btn-primary" disabled>Save Mapping</button>
            <button id="fill-table" class="btn btn-secondary" disabled>Fill Table</button>
            <button id="clear-mapping" class="btn btn-danger">Clear Mapping</button>
        </div>

        <div id="status-message" class="status-message"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
