name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag commit belongs to master
        run: |
          git fetch origin master --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/master"; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on master. Release aborted."
            exit 1
          fi

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Setup Playwright
        run: npx playwright install --with-deps firefox

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Generate consolidated test report
        if: always()
        run: node scripts/generate-test-report.js || true

      - name: Publish test summary
        if: always()
        run: |
          if [ -f test-results/summary.md ]; then
            cat test-results/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No test summary report was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Ensure AMO signing secrets are configured
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "::error::Missing AMO_JWT_ISSUER and/or AMO_JWT_SECRET GitHub secrets."
            echo "::error::Create AMO API credentials and add them before creating a release tag."
            exit 1
          fi

      - name: Sign Firefox extension (unlisted)
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npm run sign:firefox

      - name: Prepare signed XPI artifact
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SIGNED_FILE=$(find web-ext-artifacts -name "*.xpi" -type f | head -1)
          if [ ! -f "$SIGNED_FILE" ]; then
            echo "::error::No signed XPI found in web-ext-artifacts."
            exit 1
          fi
          XPI_FILE="csv-to-table-filler-${VERSION}.xpi"
          cp "$SIGNED_FILE" "$XPI_FILE"
          echo "xpi_file=$XPI_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: ${{ steps.package.outputs.xpi_file }}
          body: |
            Firefox add-on package signed by Mozilla (unlisted channel) from tag `${{ github.ref_name }}`.

            Installation:
            1. Download the `.xpi` file from this release.
            2. Open Firefox and go to `about:addons`.
            3. Choose "Install Add-on from File" and select the downloaded `.xpi`.
